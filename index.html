<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM Timelock Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section id="wallet-section" class="search-view">
        <div id="search-error" class="search-error" hidden>
          <svg class="search-error__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span id="search-error-text"></span>
        </div>
        <div class="wallet-info">
          <div class="wallet-info__col">
            <span class="wallet-info__label">Wallet</span>
            <code id="public-key" class="wallet-info__value">-</code>
          </div>
          <div class="wallet-info__col wallet-info__col--end">
            <span class="wallet-info__label">SOL Balance</span>
            <span id="sol-balance" class="wallet-info__value">-</span>
          </div>
        </div>
        <button id="connect-btn" class="btn btn--primary">Connect Phantom Wallet</button>

        <div id="connected-view" hidden>
          <div id="results" class="results" hidden></div>
          <button id="disconnect-btn" class="btn btn--disconnect">Disconnect Wallet</button>
        </div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "@solana/web3.js": "https://esm.sh/@solana/web3.js@1.95.4",
          "bs58": "https://esm.sh/bs58@6.0.0"
        }
      }
    </script>
    <script src="app.js" type="module"></script>
  </body>
</html>
